<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lyric Sync Player</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="lyrics.css">
</head>
<body>

  <div class="image-container" id="artistCard">
    <div class="image"></div>
    <button id="artistPlay"><i id="artistIcon" class="bx bx-play"></i></button>
  </div>

  <div id="lyricsContainer"></div>
  <div id="timer">0:00</div>

  <div class="progress-container">
    <div class="progress-line">
      <div class="progress-fill" id="progressFill"></div>
      <div class="progress-circle" id="circle"></div>
    </div>
  </div>

<div class="controls">
  <button id="backBtn"><i class="bx bx-skip-previous"></i></button>
  <button id="mainPlayBtn"><i id="mainIcon" class="bx bx-play"></i></button>
  <button id="skipBtn"><i class="bx bx-skip-next"></i></button>
</div>



  <script src="script.js">

  </script>
</body>
</html>
